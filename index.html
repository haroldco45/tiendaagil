<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Ágil - Vibras Positivas HM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .branding-text { color: #2563eb; font-weight: bold; }
        .btn-vibras { background-color: #2563eb; color: white; transition: 0.3s; }
        .btn-vibras:hover { background-color: #1d4ed8; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">Mi Tienda Digital</h1>
        <i class="fas fa-store text-blue-600 text-2xl"></i>
    </header>

    <!-- Main Content -->
    <main class="p-4 flex-grow">
        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
            <p class="text-blue-700 text-sm">
                <i class="fas fa-info-circle"></i> Haz que tu negocio crezca hoy mismo.
            </p>
        </div>

        <!-- Formulario Simple -->
        <div class="bg-white p-6 rounded-xl shadow-lg">
            <label class="block text-gray-700 font-semibold mb-2">Producto / Pedido:</label>
            <textarea id="pedido" rows="3" class="w-full border rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej: 2 Arroz Superarroz, 1 Leche..."></textarea>

            <label class="block text-gray-700 font-semibold mb-2">Cliente:</label>
            <input type="text" id="cliente" class="w-full border rounded-lg p-3 mb-6" placeholder="Nombre del cliente">

            <button onclick="enviarPedido()" class="w-full btn-vibras py-4 rounded-xl font-bold text-lg shadow-lg flex justify-center items-center gap-2">
                <i class="fab fa-whatsapp text-2xl"></i> ENVIAR POR WHATSAPP
            </button>
        </div>
    </main>

    <!-- Footer Obligatorio -->
    <footer class="bg-white text-center p-6 mt-auto border-t">
        <p class="text-gray-600 text-sm italic">"Transformando negocios con energía"</p>
        <p class="text-gray-800 font-bold mt-1">Hecha por Vibras Positivas HM</p>
        <p class="text-xs text-gray-500 mt-2">© 2026 Todos los derechos reservados</p>
    </footer>

    <script>
        function enviarPedido() {
            const pedido = document.getElementById('pedido').value;
            const cliente = document.getElementById('cliente').value;
            const phone = "573100000000"; // Aquí iría tu número o el del tendero

            if (!pedido) {
                alert("Por favor escribe el pedido");
                return;
            }

            // Iniciamos la geolocalización
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    const mensaje = encodeURIComponent(
                        `*NUEVO PEDIDO - VIBRAS POSITIVAS HM*\n\n` +
                        `*Cliente:* ${cliente}\n` +
                        `*Pedido:* ${pedido}\n\n` +
                        `📍 *Ubicación del negocio:* ${mapLink}`
                    );

                    window.open(`https://wa.me/${phone}?text=${mensaje}`, '_blank');
                }, () => {
                    // Si el usuario niega el permiso de ubicación
                    const mensajeSimple = encodeURIComponent(
                        `*NUEVO PEDIDO - VIBRAS POSITIVAS HM*\n\n` +
                        `*Cliente:* ${cliente}\n` +
                        `*Pedido:* ${pedido}`
                    );
                    window.open(`https://wa.me/${phone}?text=${mensajeSimple}`, '_blank');
                });
            }
        }
    </script>
</body>
</html>
